<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TANVIR EXE | ACCESS GRANTED</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #030304;
            background-image: 
                radial-gradient(circle at 50% 120%, #3d0b0b 0%, #030304 60%),
                radial-gradient(circle at 10% 10%, #1a0505 0%, transparent 20%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            overflow: hidden;
            perspective: 1500px;
        }

        .portal-card {
            width: 100%;
            max-width: 380px;
            background: rgba(15, 10, 10, 0.95);
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-top: 3px solid #ff4757;
            border-radius: 8px;
            padding: 45px 35px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9), 0 0 25px rgba(255, 71, 87, 0.15);
            position: relative;
            text-align: center;
        }

        .header-section {
            margin-bottom: 35px;
        }

        .title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 5px;
            color: #fff;
            text-transform: uppercase;
            margin-bottom: 8px;
            text-shadow: 0 0 15px rgba(255, 71, 87, 0.4);
        }

        .status-tags {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .tag {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 5px 14px;
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.4);
            border-radius: 4px;
            color: #ff4757;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #ff4757;
            text-transform: uppercase;
            margin-bottom: 11px;
            letter-spacing: 1.8px;
        }

        .input-box {
            width: 100%;
            background: rgba(30, 10, 10, 0.8);
            border: 1px solid #ff4757;
            padding: 16px 20px;
            color: #fff;
            font-size: 14px;
            border-radius: 6px;
            cursor: text;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }

        .action-btn {
            width: 100%;
            background: #ff4757;
            color: #fff;
            border: none;
            padding: 17px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
        }

        .action-btn:hover {
            background: #ff6b81;
            transform: translateY(-2px);
        }

        #notification {
            position: fixed;
            top: 20px;
            right: -300px;
            background: #ff4757;
            color: white;
            padding: 15px 25px;
            border-radius: 5px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            letter-spacing: 1px;
            transition: 0.5s ease;
            z-index: 9999;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }

        #notification.show { right: 20px; }

        .scan-line {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 71, 87, 0.6), transparent);
            position: absolute;
            top: 0;
            left: 0;
            animation: scanning 3s linear infinite;
        }

        @keyframes scanning {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .footer-note {
            margin-top: 30px;
            font-size: 11px;
            color: #888;
            line-height: 1.8;
        }
    </style>
</head>
<body>

<div id="notification">Invalid Uid</div>

<div class="portal-card">
    <div class="scan-line"></div>
    
    <div class="header-section">
        <h1 class="title">TANVIR EXE</h1>
        <div class="status-tags">
            <span class="tag">● System Online</span>
            <span class="tag">Global v4.0</span>
        </div>
    </div>

    <form id="accessForm">
        <div class="form-group">
            <label>Authentication UID</label>
            <input type="text" id="uidInput" class="input-box" placeholder="Enter Your Uid" autocomplete="off">
        </div>

        <button type="submit" class="action-btn">
            <span>START EXECUTION</span>
        </button>
    </form>

    <div class="card-footer">
        <p class="footer-note">
            Verification required for system access. <br>
            All modules are monitored and logged.
        </p>
    </div>
</div>

<script>
(function () {
  'use strict';
  function isEditableTarget(el) {
    if (!el || el.nodeType !== 1) return false;
    const tag = el.tagName;
    if (tag === 'TEXTAREA') return true;
    if (tag === 'INPUT') {
      const t = (el.type || '').toLowerCase();
      return !['button', 'checkbox', 'radio', 'submit', 'reset', 'file', 'hidden'].includes(t);
    }
    return el.isContentEditable === true;
  }
  function stop(e) {
    e.preventDefault();
    e.stopPropagation();
    return false;
  }
  var DEVTOOL_CODES = { KeyI: 1, KeyJ: 1, KeyC: 1, KeyK: 1, KeyM: 1, KeyP: 1, KeyE: 1 };
  document.addEventListener('keydown', function (e) {
      if (isEditableTarget(e.target)) {
        var k = (e.key || '').toLowerCase();
        if ((e.ctrlKey || e.metaKey) && ['c', 'v', 'x', 'a'].includes(k)) return;
      }
      if (e.key === 'F12' || e.keyCode === 123) return stop(e);
      if (e.shiftKey && (e.key === 'F10' || e.code === 'F10')) return stop(e);
      var mod = e.ctrlKey || e.metaKey;
      var code = e.code || '';
      if (mod && e.shiftKey && !e.altKey && DEVTOOL_CODES[code]) return stop(e);
      if (code === 'Backquote') {
        if (e.ctrlKey && !e.metaKey && !e.altKey && !e.shiftKey) return stop(e);
        if (e.ctrlKey && !e.metaKey && e.shiftKey) return stop(e);
      }
      if (e.metaKey && e.altKey) {
        if (['KeyI', 'KeyJ', 'KeyC', 'KeyU'].indexOf(code) !== -1) return stop(e);
      }
      if (mod && !e.shiftKey && !e.altKey) {
        if (code === 'KeyU' || code === 'KeyS') return stop(e);
      }
      if (mod && e.shiftKey && code === 'KeyU') return stop(e);
    }, true);
  document.addEventListener('contextmenu', function (e) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }, true);
  document.addEventListener('mousedown', function (e) {
      if (e.button === 2) {
        e.preventDefault();
        e.stopPropagation();
      }
    }, true);
})();

    const form = document.getElementById('accessForm');
    const input = document.getElementById('uidInput');
    const notify = document.getElementById('notification');

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const uidValue = input.value.trim();
        if (uidValue.length < 9 || uidValue.length > 15) {
            notify.classList.add('show');
            setTimeout(() => {
                notify.classList.remove('show');
            }, 3000);
        } else {
            // Submit to server
            fetch('/free_add', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `uid=${encodeURIComponent(uidValue)}`
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showSuccessNotification(uidValue);
                    input.value = '';
                } else {
                    showErrorNotification(data.message || 'Failed to add UID');
                }
            })
            .catch(error => {
                showErrorNotification('Network error');
            });
        }
    });

    function showSuccessNotification(uid) {
        // Create notification element like admin dashboard
        const notification = document.createElement('div');
        notification.id = 'successNotification';
        notification.style.cssText = `
            position: fixed;
            top: 30px;
            right: -350px;
            background: #0f0a0a;
            color: #fff;
            border-left: 4px solid #00ff88;
            padding: 18px 30px;
            border-radius: 4px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 3000;
        `;
        notification.innerHTML = `
            <div style="font-size: 16px; margin-bottom: 5px;">ACCESS GRANTED FOR 2 DAYS</div>
        `;
        
        document.body.appendChild(notification);
        
        // Show notification
        setTimeout(() => {
            notification.style.right = '30px';
        }, 100);
        
        // Hide notification
        setTimeout(() => {
            notification.style.right = '-350px';
            setTimeout(() => {
                document.body.removeChild(notification);
            }, 500);
        }, 4000);
    }

    function showErrorNotification(message) {
        // Create error notification like admin dashboard
        const notification = document.createElement('div');
        notification.id = 'errorNotification';
        notification.style.cssText = `
            position: fixed;
            top: 30px;
            right: -350px;
            background: #0f0a0a;
            color: #fff;
            border-left: 4px solid #ff4757;
            padding: 18px 30px;
            border-radius: 4px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 3000;
        `;
        notification.innerHTML = `
            <div style="font-size: 16px;">ERROR</div>
            <div style="font-size: 14px; opacity: 0.8; margin-top: 3px;">${message}</div>
        `;
        
        document.body.appendChild(notification);
        
        // Show notification
        setTimeout(() => {
            notification.style.right = '30px';
        }, 100);
        
        // Hide notification
        setTimeout(() => {
            notification.style.right = '-350px';
            setTimeout(() => {
                document.body.removeChild(notification);
            }, 500);
        }, 3000);
    }
</script>
</body>
</html>
